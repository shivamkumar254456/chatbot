<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#131314',
                            sidebarLight: '#f0f4f9',
                            sidebarDark: '#1e1f20',
                            borderLight: '#e3e3e3',
                            borderDark: '#444746'
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Markdown Styles */
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body code { background-color: rgba(128, 128, 128, 0.2); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
        
        /* Adjusted pre tag for the copy-button wrapper */
        .markdown-body pre { background-color: transparent; color: #d4d4d4; padding: 1rem; overflow-x: auto; margin: 0; }
        .markdown-body pre code { background-color: transparent; padding: 0; color: inherit; font-size: 0.9em; }
        
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body h1 { font-size: 1.5rem; }
        .markdown-body h2 { font-size: 1.25rem; }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Loader */
        #loading { transition: opacity 0.3s ease; }
        
        /* Input Auto-resize */
        textarea { resize: none; overflow-y: hidden; }
        
        /* Typing animation dot */
        .typing-indicator::after {
            content: '▋';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-white dark:bg-gemini-dark text-gray-800 dark:text-gray-200 m-0 p-0 transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white dark:bg-gemini-dark">
        <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
        <div class="text-xl font-semibold">Loading App...</div>
    </div>

    <div class="flex min-h-[100dvh] w-full relative">

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden transition-opacity" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 lg:flex-shrink-0 bg-gemini-sidebarLight dark:bg-gemini-sidebarDark transform -translate-x-full lg:translate-x-0 lg:sticky lg:top-0 lg:h-[100dvh] lg:flex flex-col transition-transform duration-300 ease-in-out border-r border-gemini-borderLight dark:border-gemini-borderDark">
            <div class="p-4 flex justify-between items-center">
                <button onclick="createNewChat()" class="flex-1 bg-white dark:bg-gemini-dark border border-gemini-borderLight dark:border-gemini-borderDark hover:bg-gray-50 dark:hover:bg-gray-800 text-sm font-medium py-2.5 px-4 rounded-full flex items-center justify-center gap-2 shadow-sm transition-colors">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                </div>

            <div class="p-4 border-t border-gemini-borderLight dark:border-gemini-borderDark space-y-2">
                <button onclick="toggleTheme()" class="w-full text-left px-4 py-2.5 text-sm rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 flex items-center gap-3 transition-colors">
                    <i id="theme-icon" class="fas fa-moon w-5 text-center"></i>
                    <span id="theme-text">Dark Mode</span>
                </button>
                <button onclick="openSettings()" class="w-full text-left px-4 py-2.5 text-sm rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 flex items-center gap-3 transition-colors">
                    <i class="fas fa-cog w-5 text-center"></i> Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 relative">
            
            <header class="sticky top-0 z-10 p-4 flex items-center justify-between bg-white/90 dark:bg-gemini-dark/90 backdrop-blur-md border-b border-transparent">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 lg:hidden focus:outline-none">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 id="current-chat-title" class="font-semibold text-lg truncate">New Chat</h1>
                </div>
                
                <div class="flex items-center">
                    <button onclick="exportChat()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors" title="Export Chat to Markdown">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </header>

            <div id="messages-container" class="flex-1 w-full max-w-3xl mx-auto p-4 md:p-6 pb-[32rem] flex flex-col gap-6">
                </div>

            <div class="fixed bottom-0 left-0 lg:left-72 right-0 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-gemini-dark dark:via-gemini-dark/95 pb-4 pt-12 px-4 z-20">
                <div class="max-w-3xl mx-auto relative bg-white dark:bg-gemini-sidebarDark border border-gemini-borderLight dark:border-gemini-borderDark rounded-3xl shadow-lg focus-within:ring-1 focus-within:ring-gray-300 dark:focus-within:ring-gray-600 transition-shadow flex items-end px-4 py-2 gap-2">
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 text-base max-h-32 focus:outline-none placeholder-gray-500" 
                        placeholder="Message AI..."
                        oninput="autoResize(this)"
                        onkeydown="handleEnter(event)"></textarea>
                    <button id="send-btn" onclick="sendMessage()" class="p-3 mb-1 rounded-full text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-center text-xs text-gray-400 mt-2">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] bg-black/50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-white dark:bg-gemini-sidebarDark rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-200 p-6 flex flex-col gap-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold">Settings</h2>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white"><i class="fas fa-times text-lg"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2.5 rounded-lg border border-gemini-borderLight dark:border-gemini-borderDark bg-transparent focus:outline-none focus:border-blue-500" placeholder="sk-or-v1-...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Model ID</label>
                    <input type="text" id="model-input" class="w-full p-2.5 rounded-lg border border-gemini-borderLight dark:border-gemini-borderDark bg-transparent focus:outline-none focus:border-blue-500" placeholder="deepseek/deepseek-r1:free">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-2.5 rounded-lg border border-gemini-borderLight dark:border-gemini-borderDark bg-transparent focus:outline-none focus:border-blue-500" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>

            <div class="mt-4 flex justify-end gap-2">
                <button onclick="closeSettings()" class="px-4 py-2 rounded-lg font-medium hover:bg-gray-100 dark:hover:bg-gray-800">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // CUSTOM MARKED.JS RENDERER (For Copy Code functionality)
        // ----------------------------------------------------
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = language || 'plaintext';
            return `
                <div class="code-block-wrapper relative group my-4 rounded-lg bg-[#1e1e1e] border border-gray-700 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-1.5 bg-[#2d2d2d] border-b border-gray-700">
                        <span class="text-xs text-gray-400 font-mono">${validLang}</span>
                        <button onclick="copyCodeBlock(this)" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1.5 text-xs py-1 px-2 rounded">
                            <i class="fas fa-copy"></i> <span>Copy</span>
                        </button>
                    </div>
                    <pre><code class="language-${validLang}">${escapeHTML(code)}</code></pre>
                </div>
            `;
        };
        marked.use({ renderer });

        function copyCodeBlock(button) {
            const preContainer = button.closest('.code-block-wrapper');
            const codeEl = preContainer.querySelector('code');
            const codeText = codeEl.innerText;

            navigator.clipboard.writeText(codeText).then(() => {
                const originalHTML = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check text-green-400"></i> <span class="text-green-400">Copied!</span>';
                setTimeout(() => {
                    button.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                console.error("Failed to copy code: ", err);
            });
        }


        // ----------------------------------------------------
        // STATE & INITIALIZATION
        // ----------------------------------------------------
        
        let state = {
            settings: {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, smart, and concise AI assistant.',
                theme: 'light'
            },
            chats: [],
            currentChatId: null
        };

        let isStreaming = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            applyTheme();
            
            if (state.chats.length === 0) {
                createNewChat();
            } else {
                if (!state.currentChatId || !state.chats.find(c => c.id === state.currentChatId)) {
                    state.currentChatId = state.chats[0].id;
                }
                renderSidebar();
                renderMessages();
            }

            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 300);

            document.getElementById('user-input').addEventListener('input', function() {
                document.getElementById('send-btn').disabled = this.value.trim().length === 0;
            });
        });

        // ----------------------------------------------------
        // LOCAL STORAGE MANAGEMENT
        // ----------------------------------------------------

        function loadState() {
            try {
                const saved = localStorage.getItem('universalAiChatState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.settings = { ...state.settings, ...parsed.settings };
                    state.chats = parsed.chats || [];
                    state.currentChatId = parsed.currentChatId;
                }
            } catch (e) {
                console.error("Failed to load state", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem('universalAiChatState', JSON.stringify(state));
            } catch (e) {
                console.error("Failed to save state", e);
            }
        }

        // ----------------------------------------------------
        // UI & LAYOUT LOGIC
        // ----------------------------------------------------

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function toggleTheme() {
            state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
            saveState();
        }

        function applyTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');

            if (state.settings.theme === 'dark') {
                html.classList.add('dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                themeText.textContent = 'Light Mode';
            } else {
                html.classList.remove('dark');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                themeText.textContent = 'Dark Mode';
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!document.getElementById('send-btn').disabled && !isStreaming) {
                    sendMessage();
                }
            }
        }

        function scrollToBottom(smooth = true) {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: smooth ? 'smooth' : 'auto'
            });
        }

        // ----------------------------------------------------
        // SETTINGS MODAL LOGIC
        // ----------------------------------------------------

        function openSettings() {
            const modal = document.getElementById('settings-modal');
            const modalInner = modal.querySelector('div');
            
            document.getElementById('api-key-input').value = state.settings.apiKey;
            document.getElementById('model-input').value = state.settings.model;
            document.getElementById('system-prompt-input').value = state.settings.systemPrompt;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95');
            }, 10);
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            const modalInner = modal.querySelector('div');
            
            modal.classList.add('opacity-0');
            modalInner.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function saveSettings() {
            state.settings.apiKey = document.getElementById('api-key-input').value.trim();
            state.settings.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            state.settings.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            saveState();
            closeSettings();
        }

        // ----------------------------------------------------
        // CHAT MANAGEMENT & EXPORT LOGIC
        // ----------------------------------------------------

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createNewChat() {
            if (isStreaming) return;
            const newChat = {
                id: generateId(),
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            renderSidebar();
            renderMessages();
            
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function selectChat(id) {
            if (isStreaming || state.currentChatId === id) return;
            state.currentChatId = id;
            saveState();
            renderSidebar();
            renderMessages();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            if (isStreaming || !confirm("Delete this chat?")) return;
            
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
            }
            if (state.chats.length === 0) {
                createNewChat();
            } else {
                saveState();
                renderSidebar();
                renderMessages();
            }
        }

        function renameChat(e, id) {
            e.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            const newTitle = prompt("Enter new title:", chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState();
                renderSidebar();
                renderTitle();
            }
        }

        function exportChat() {
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat || chat.messages.length === 0) {
                alert("This chat is empty.");
                return;
            }

            let exportData = `# ${chat.title}\n\n`;
            chat.messages.forEach(msg => {
                const roleName = msg.role === 'user' ? '👤 User' : '🤖 AI';
                exportData += `### ${roleName}\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([exportData], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${chat.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.md`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ----------------------------------------------------
        // RENDER LOGIC
        // ----------------------------------------------------

        function renderSidebar() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            state.chats.forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const activeClass = isActive ? 'bg-blue-50 dark:bg-gray-800 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300';
                
                const item = document.createElement('div');
                item.className = `group flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer transition-colors ${activeClass}`;
                item.onclick = () => selectChat(chat.id);
                
                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="far fa-message text-sm opacity-70"></i>
                        <span class="truncate text-sm">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="hidden group-hover:flex items-center gap-2 pl-2">
                        <button onclick="renameChat(event, '${chat.id}')" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200" title="Rename"><i class="fas fa-pencil-alt text-xs"></i></button>
                        <button onclick="deleteChat(event, '${chat.id}')" class="text-gray-400 hover:text-red-500" title="Delete"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
            renderTitle();
        }

        function renderTitle() {
            const chat = state.chats.find(c => c.id === state.currentChatId);
            document.getElementById('current-chat-title').textContent = chat ? chat.title : 'New Chat';
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-center opacity-50 mt-20">
                        <i class="fas fa-sparkles text-4xl mb-4"></i>
                        <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                    </div>
                `;
                return;
            }

            chat.messages.forEach(msg => appendMessageBubble(msg.role, msg.content));
            setTimeout(() => scrollToBottom(true), 100);
        }

        function appendMessageBubble(role, content, id = null) {
            const container = document.getElementById('messages-container');
            
            if (container.querySelector('.fa-sparkles')) {
                container.innerHTML = '';
            }

            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            if (id) wrapper.id = `msg-${id}`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[100%] md:max-w-[85%] rounded-2xl px-5 py-3.5 shadow-sm text-[15px] leading-relaxed markdown-body overflow-hidden `;
            
            if (role === 'user') {
                bubble.className += 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-br-sm';
                bubble.textContent = content; 
            } else {
                bubble.className += 'bg-transparent text-gray-900 dark:text-gray-100';
                if (content) {
                    bubble.innerHTML = marked.parse(content);
                }
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            return bubble;
        }

        // ----------------------------------------------------
        // AI & STREAMING LOGIC
        // ----------------------------------------------------

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if (!text || isStreaming) return;

            if (!state.settings.apiKey) {
                alert("Please set your OpenRouter API Key in Settings first.");
                openSettings();
                return;
            }

            inputEl.value = '';
            inputEl.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;
            
            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            if (chat.messages.length === 0) {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                renderSidebar();
            }

            chat.messages.push({ role: 'user', content: text });
            appendMessageBubble('user', text);
            saveState();
            scrollToBottom(true); 

            isStreaming = true;
            const msgId = generateId();
            const aiBubbleWrapper = appendMessageBubble('assistant', '', msgId);
            aiBubbleWrapper.classList.add('typing-indicator');

            const payloadMessages = [];
            if (state.settings.systemPrompt) {
                payloadMessages.push({ role: 'system', content: state.settings.systemPrompt });
            }
            payloadMessages.push(...chat.messages);

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.settings.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'Universal AI Chat'
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: payloadMessages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API Error ${response.status}: ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('data: ')) {
                            if (line === 'data: [DONE]') continue;
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0]?.delta?.content || "";
                                aiText += content;
                                
                                aiBubbleWrapper.innerHTML = marked.parse(aiText);
                                
                                const scrollDistToBottom = document.body.scrollHeight - (window.scrollY + window.innerHeight);
                                if (scrollDistToBottom < 150) {
                                    scrollToBottom(false); 
                                }
                            } catch (e) {
                                // Ignore partial JSON chunks
                            }
                        }
                    }
                }

                aiBubbleWrapper.classList.remove('typing-indicator');
                chat.messages.push({ role: 'assistant', content: aiText });
                saveState();

            } catch (error) {
                console.error("Streaming error:", error);
                aiBubbleWrapper.classList.remove('typing-indicator');
                aiBubbleWrapper.innerHTML = `<span class="text-red-500"><i class="fas fa-exclamation-triangle"></i> Error: ${escapeHTML(error.message)}</span>`;
            } finally {
                isStreaming = false;
                scrollToBottom(true);
            }
        }

        // Utility: Escape HTML
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

    </script>
</body>
</html>
