<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine Apex BOT</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glassLight: 'rgba(255, 255, 255, 0.7)',
                        glassDark: 'rgba(30, 30, 35, 0.7)',
                    },
                    animation: {
                        'bounce-slow': 'bounce 1.5s infinite',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Markdown Styles */
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body code { background-color: rgba(128, 128, 128, 0.15); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; color: #d946ef; }
        .dark .markdown-body code { color: #f472b6; }
        .markdown-body pre { background-color: transparent; color: #d4d4d4; padding: 1rem; overflow-x: auto; margin: 0; }
        .markdown-body pre code { background-color: transparent; padding: 0; color: inherit; font-size: 0.9em; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #4f46e5; }

        /* Loader */
        #loading { transition: opacity 0.4s ease; }
        
        /* Input Auto-resize */
        textarea { resize: none; overflow-y: hidden; }
        
        /* Awesome Animations */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg-animate {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Typing Dots */
        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #8b5cf6;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-pink-50 dark:from-gray-900 dark:via-indigo-950 dark:to-purple-950 text-gray-800 dark:text-gray-200 m-0 p-0 transition-colors duration-500 min-h-[100dvh]">

    <div id="loading" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white dark:bg-gray-900">
        <div class="relative w-16 h-16">
            <div class="absolute inset-0 rounded-full border-t-4 border-violet-500 animate-spin"></div>
            <div class="absolute inset-2 rounded-full border-r-4 border-fuchsia-500 animate-spin" style="animation-direction: reverse;"></div>
        </div>
        <div class="text-xl font-semibold mt-4 bg-clip-text text-transparent bg-gradient-to-r from-violet-500 to-fuchsia-500">Loading Mine Apex BOT...</div>
    </div>

    <div class="flex min-h-[100dvh] w-full relative">

        <div id="sidebar-overlay" class="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 lg:flex-shrink-0 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl transform -translate-x-full lg:translate-x-0 lg:sticky lg:top-0 lg:h-[100dvh] lg:flex flex-col transition-transform duration-300 ease-in-out border-r border-white/20 dark:border-gray-700/50 shadow-2xl lg:shadow-none">
            
            <div class="px-5 pt-6 pb-2 flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl overflow-hidden shadow-lg shadow-violet-500/30 flex-shrink-0 bg-gray-900 flex items-center justify-center">
                    <img src="image_06067b.jpg" alt="Mine Apex Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="font-bold text-xl tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600">Mine Apex</h1>
            </div>

            <div class="p-4 flex justify-between items-center">
                <button onclick="createNewChat()" class="flex-1 bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white text-sm font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden ml-3 p-2 rounded-full hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="px-5 pb-2 pt-2 text-xs font-bold text-violet-500 dark:text-fuchsia-400 uppercase tracking-widest">Conversations</div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-2 mt-2">
                </div>

            <div class="p-4 space-y-2 border-t border-gray-200/50 dark:border-gray-700/50">
                <button onclick="toggleTheme()" class="w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-white/50 dark:hover:bg-gray-800/50 flex items-center gap-3 transition-all duration-200 font-medium">
                    <div class="w-8 h-8 rounded-full bg-violet-100 dark:bg-indigo-900/50 flex items-center justify-center text-violet-600 dark:text-violet-400"><i id="theme-icon" class="fas fa-moon"></i></div>
                    <span id="theme-text">Dark Mode</span>
                </button>
                <button onclick="openSettings()" class="w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-white/50 dark:hover:bg-gray-800/50 flex items-center gap-3 transition-all duration-200 font-medium">
                    <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-400"><i class="fas fa-cog"></i></div>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 relative">
            
            <header class="sticky top-0 z-10 p-4 flex items-center justify-between bg-white/40 dark:bg-gray-900/40 backdrop-blur-md border-b border-white/20 dark:border-gray-800/50">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-xl hover:bg-white/50 dark:hover:bg-gray-800/50 lg:hidden focus:outline-none transition-colors">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <h1 id="current-chat-title" class="font-bold text-lg bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 truncate max-w-[200px] md:max-w-md">New Chat</h1>
                </div>
                
                <div class="flex items-center">
                    <button onclick="exportChat()" class="p-2.5 rounded-xl bg-white/50 dark:bg-gray-800/50 hover:bg-white dark:hover:bg-gray-700 text-violet-600 dark:text-violet-400 shadow-sm transition-all hover:scale-105" title="Export Chat">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </header>

            <div id="messages-container" class="w-full max-w-4xl mx-auto p-4 md:p-6 flex flex-col gap-6">
                </div>

            <div id="scroll-anchor" class="w-full h-[180px] flex-shrink-0"></div>

            <div class="fixed bottom-0 left-0 lg:left-72 right-0 pb-6 pt-10 px-4 z-20 bg-gradient-to-t from-white via-white/80 to-transparent dark:from-gray-900 dark:via-gray-900/80 pointer-events-none">
                <div class="max-w-4xl mx-auto relative pointer-events-auto">
                    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-2xl border border-white/40 dark:border-gray-700/50 rounded-2xl shadow-2xl focus-within:ring-2 focus-within:ring-violet-400/50 transition-all flex items-end px-3 py-2 gap-2 transform hover:-translate-y-1 duration-300">
                        <button class="p-3 mb-1 rounded-xl text-violet-500 hover:bg-violet-100 dark:hover:bg-gray-700 transition-colors">
                            <i class="fas fa-image"></i>
                        </button>
                        <textarea 
                            id="user-input" 
                            rows="1" 
                            class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 text-base max-h-32 focus:outline-none placeholder-gray-400 dark:placeholder-gray-500" 
                            placeholder="Ask Mine Apex BOT..."
                            oninput="autoResize(this)"
                            onkeydown="handleEnter(event)"></textarea>
                        <button id="send-btn" onclick="sendMessage()" class="p-3 mb-1 rounded-xl bg-violet-600 hover:bg-fuchsia-600 text-white disabled:opacity-40 disabled:hover:bg-violet-600 transition-all duration-300 shadow-md" disabled>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="text-center text-xs text-gray-400 dark:text-gray-500 mt-3 font-medium">
                        Mine Apex BOT can make mistakes. Verify important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[100] bg-indigo-900/50 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-xl border border-white/20 dark:border-gray-700 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform scale-95 transition-transform duration-300 p-8 flex flex-col gap-5">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600">Preferences</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-red-500 transition-colors p-2"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:ring-2 focus:ring-violet-500 transition-shadow" placeholder="sk-or-v1-...">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-600 dark:text-gray-300 mb-1">Model ID</label>
                    <input type="text" id="model-input" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:ring-2 focus:ring-violet-500 transition-shadow" placeholder="deepseek/deepseek-r1:free">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 dark:text-gray-300 mb-1">System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:ring-2 focus:ring-violet-500 transition-shadow" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>

            <div class="mt-4 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-5 py-2.5 rounded-xl font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl transition-all hover:-translate-y-0.5">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = language || 'plaintext';
            return `
                <div class="code-block-wrapper relative group my-5 rounded-xl bg-gray-900 shadow-xl overflow-hidden border border-gray-800">
                    <div class="flex items-center justify-between px-4 py-2 bg-gray-950 border-b border-gray-800/50">
                        <span class="text-xs text-violet-400 font-mono font-bold tracking-wider uppercase">${validLang}</span>
                        <button onclick="copyCodeBlock(this)" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1.5 text-xs py-1 px-3 rounded-lg bg-gray-800 hover:bg-gray-700">
                            <i class="fas fa-copy"></i> <span>Copy</span>
                        </button>
                    </div>
                    <pre><code class="language-${validLang}">${escapeHTML(code)}</code></pre>
                </div>
            `;
        };
        marked.use({ renderer });

        function copyCodeBlock(button) {
            const preContainer = button.closest('.code-block-wrapper');
            const codeEl = preContainer.querySelector('code');
            const codeText = codeEl.innerText;

            navigator.clipboard.writeText(codeText).then(() => {
                const originalHTML = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check text-green-400"></i> <span class="text-green-400">Copied!</span>';
                setTimeout(() => {
                    button.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => console.error("Failed to copy code: ", err));
        }

        let state = {
            settings: {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, smart, and concise AI assistant.',
                theme: 'light'
            },
            chats: [],
            currentChatId: null
        };

        let isStreaming = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            applyTheme();
            
            if (state.chats.length === 0) {
                createNewChat();
            } else {
                if (!state.currentChatId || !state.chats.find(c => c.id === state.currentChatId)) {
                    state.currentChatId = state.chats[0].id;
                }
                renderSidebar();
                renderMessages();
            }

            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 400);

            document.getElementById('user-input').addEventListener('input', function() {
                document.getElementById('send-btn').disabled = this.value.trim().length === 0;
            });
        });

        function loadState() {
            try {
                const saved = localStorage.getItem('universalAiChatState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.settings = { ...state.settings, ...parsed.settings };
                    state.chats = parsed.chats || [];
                    state.currentChatId = parsed.currentChatId;
                }
            } catch (e) { console.error("Failed to load state", e); }
        }

        function saveState() {
            try { localStorage.setItem('universalAiChatState', JSON.stringify(state)); } 
            catch (e) { console.error("Failed to save state", e); }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function toggleTheme() {
            state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
            saveState();
        }

        function applyTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');

            if (state.settings.theme === 'dark') {
                html.classList.add('dark');
                themeIcon.className = 'fas fa-sun';
                themeText.textContent = 'Light Mode';
            } else {
                html.classList.remove('dark');
                themeIcon.className = 'fas fa-moon';
                themeText.textContent = 'Dark Mode';
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!document.getElementById('send-btn').disabled && !isStreaming) {
                    sendMessage();
                }
            }
        }

        // SCROLL FIX: Force browser to scroll to the anchor element at the very bottom
        function scrollToBottom(smooth = true) {
            setTimeout(() => {
                const anchor = document.getElementById('scroll-anchor');
                if (anchor) {
                    anchor.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'end' });
                }
            }, 50);
        }

        function openSettings() {
            const modal = document.getElementById('settings-modal');
            const modalInner = modal.querySelector('div');
            
            document.getElementById('api-key-input').value = state.settings.apiKey;
            document.getElementById('model-input').value = state.settings.model;
            document.getElementById('system-prompt-input').value = state.settings.systemPrompt;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('scale-95');
            }, 10);
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            const modalInner = modal.querySelector('div');
            
            modal.classList.add('opacity-0');
            modalInner.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function saveSettings() {
            state.settings.apiKey = document.getElementById('api-key-input').value.trim();
            state.settings.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            state.settings.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            saveState();
            closeSettings();
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createNewChat() {
            if (isStreaming) return;
            const newChat = { id: generateId(), title: 'New Conversation', messages: [] };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            renderSidebar();
            renderMessages();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function selectChat(id) {
            if (isStreaming || state.currentChatId === id) return;
            state.currentChatId = id;
            saveState();
            renderSidebar();
            renderMessages();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            if (isStreaming || !confirm("Delete this conversation?")) return;
            
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
            }
            if (state.chats.length === 0) createNewChat();
            else { saveState(); renderSidebar(); renderMessages(); }
        }

        function renameChat(e, id) {
            e.stopPropagation();
            const chat = state.chats.find(c => c.id === id);
            const newTitle = prompt("Name this conversation:", chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveState(); renderSidebar(); renderTitle();
            }
        }

        function exportChat() {
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat || chat.messages.length === 0) { alert("This chat is empty."); return; }

            let exportData = `# ${chat.title}\n\n`;
            chat.messages.forEach(msg => {
                const roleName = msg.role === 'user' ? '👤 You' : '🤖 Mine Apex BOT';
                exportData += `### ${roleName}\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([exportData], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${chat.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.md`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function renderSidebar() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            
            state.chats.forEach(chat => {
                const isActive = chat.id === state.currentChatId;
                const activeClass = isActive 
                    ? 'bg-violet-100 dark:bg-indigo-900/50 text-violet-700 dark:text-violet-300 shadow-sm border border-violet-200 dark:border-indigo-800' 
                    : 'hover:bg-gray-100/80 dark:hover:bg-gray-800/80 text-gray-700 dark:text-gray-300 border border-transparent';
                
                const item = document.createElement('div');
                item.className = `group flex items-center justify-between px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 font-medium ${activeClass}`;
                item.onclick = () => selectChat(chat.id);
                
                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="far fa-message opacity-70 ${isActive ? 'text-fuchsia-500' : ''}"></i>
                        <span class="truncate text-sm">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="hidden group-hover:flex items-center gap-2 pl-2">
                        <button onclick="renameChat(event, '${chat.id}')" class="text-gray-400 hover:text-violet-500 transition-colors" title="Rename"><i class="fas fa-pencil-alt text-xs"></i></button>
                        <button onclick="deleteChat(event, '${chat.id}')" class="text-gray-400 hover:text-red-500 transition-colors" title="Delete"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
            renderTitle();
        }

        function renderTitle() {
            const chat = state.chats.find(c => c.id === state.currentChatId);
            document.getElementById('current-chat-title').textContent = chat ? chat.title : 'New Chat';
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-center mt-20 msg-animate">
                        <div class="w-32 h-32 mb-6 rounded-3xl overflow-hidden shadow-2xl shadow-violet-500/30 transform hover:scale-105 transition-transform duration-500 bg-gray-900 flex items-center justify-center">
                            <img src="image_06067b.jpg" alt="Mine Apex Logo" class="w-full h-full object-cover">
                        </div>
                        <h2 class="text-3xl font-bold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600">Mine Apex BOT</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-md">How can I help you today? Ask a question, brainstorm ideas, or generate code.</p>
                    </div>
                `;
                return;
            }

            chat.messages.forEach(msg => appendMessageBubble(msg.role, msg.content, null, false));
            scrollToBottom(true);
        }

        function appendMessageBubble(role, content, id = null, animate = true) {
            const container = document.getElementById('messages-container');
            
            if (container.querySelector('.fa-mountain') || container.querySelector('img[alt="Mine Apex Logo"]')) {
                container.innerHTML = '';
            }

            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} ${animate ? 'msg-animate' : ''}`;
            if (id) wrapper.id = `msg-${id}`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[100%] md:max-w-[85%] rounded-3xl px-6 py-4 text-[15px] leading-relaxed markdown-body overflow-hidden shadow-sm `;
            
            if (role === 'user') {
                bubble.className += 'bg-gradient-to-br from-violet-600 to-fuchsia-600 text-white rounded-tr-sm shadow-md shadow-violet-500/20';
                bubble.textContent = content; 
            } else {
                bubble.className += 'bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border border-white/40 dark:border-gray-700/50 text-gray-800 dark:text-gray-200 rounded-tl-sm';
                if (content) bubble.innerHTML = marked.parse(content);
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            return bubble;
        }

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if (!text || isStreaming) return;

            if (!state.settings.apiKey) {
                alert("Please set your OpenRouter API Key in Settings first.");
                openSettings(); return;
            }

            inputEl.value = '';
            inputEl.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;
            
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (chat.messages.length === 0) {
                chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                renderSidebar();
            }

            chat.messages.push({ role: 'user', content: text });
            appendMessageBubble('user', text);
            saveState();
            scrollToBottom(true); 

            isStreaming = true;
            const msgId = generateId();
            const aiBubbleWrapper = appendMessageBubble('assistant', '', msgId);
            
            aiBubbleWrapper.innerHTML = `<div class="typing-dots flex items-center h-6"><span></span><span></span><span></span></div>`;

            const payloadMessages = [];
            if (state.settings.systemPrompt) payloadMessages.push({ role: 'system', content: state.settings.systemPrompt });
            payloadMessages.push(...chat.messages);

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.settings.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'Mine Apex BOT'
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: payloadMessages,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`API Error ${response.status}: ${await response.text()}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('data: ')) {
                            if (line === 'data: [DONE]') continue;
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0]?.delta?.content || "";
                                aiText += content;
                                aiBubbleWrapper.innerHTML = marked.parse(aiText);
                                
                                // NEW SCROLL FIX logic updated
                                const scrollDistToBottom = document.documentElement.scrollHeight - (window.scrollY + window.innerHeight);
                                if (scrollDistToBottom < 300) scrollToBottom(false); 
                            } catch (e) { /* Ignore partial JSON chunks */ }
                        }
                    }
                }

                chat.messages.push({ role: 'assistant', content: aiText });
                saveState();

            } catch (error) {
                console.error("Streaming error:", error);
                aiBubbleWrapper.innerHTML = `<span class="text-red-500 font-semibold"><i class="fas fa-exclamation-triangle"></i> Error: ${escapeHTML(error.message)}</span>`;
            } finally {
                isStreaming = false;
                scrollToBottom(true);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
